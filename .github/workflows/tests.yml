name: Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

jobs:
  lint-and-format:
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: checkout code repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
      - run: npm i -g pnpm
      - name: install dependencies
        run: pnpm install
      - name: lint
        run: pnpm run lint
      - name: format
        run: pnpm run format:check

  node-tests:
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: checkout code repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
      - run: npm i -g pnpm
      - name: install dependencies
        run: pnpm install
      - name: build
        run: pnpm run build
      - name: tests
        run: pnpm run test
  deno-tests:
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest
    needs: lint-and-format
    services:
      mongodb:
        image: mongo
        options: >-
          --health-cmd "echo 'db.runCommand("ping").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: checkout code repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org/
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - run: npm i -g pnpm
      - run: pnpm install
      - run: pnpm build
      - name: tests
        run: pnpm run test:deno
